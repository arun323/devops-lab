name: Terraform Apply

on:
  push:
    branches:
      - main
      - feature/*
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/**'

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Resolve AWS_ROLE_ARN
        id: resolve_role_arn
        run: |
          ROLE_ARN=""
          # Removed 'devops-lab/' because checkout places you directly inside the repo root
          candidates=("terraform/terraform.tfvars" "terraform/terraform.tfvars")
          
          for f in "${candidates[@]}"; do
            if [ -f "$f" ]; then
              # Adjusted to look for 'role_arn' instead of 'aws_role_arn'
              ROLE_ARN=$(grep -E '^\s*role_arn\s*=' "$f" | sed -E 's/.*=\s*"([^"]*)".*/\1/')
              if [ -n "$ROLE_ARN" ]; then
                break
              fi
            fi
          done

          if [ -z "$ROLE_ARN" ]; then
            echo "Unable to resolve role_arn from locations: ${candidates[*]}"
            exit 1
          fi

          # Security best practice: Mask the ARN from being leaked in public runner logs
          echo "::add-mask::$ROLE_ARN"
          
          echo "role_arn=$ROLE_ARN" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ steps.resolve_role_arn.outputs.role_arn }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: devops-lab/terraform
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: devops-lab/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: devops-lab/terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: devops-lab/terraform
        run: terraform apply -auto-approve tfplan
