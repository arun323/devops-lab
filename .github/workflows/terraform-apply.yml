name: Terraform Apply

on:
  push:
    branches:
      - main
      - feature/*
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/**'

permissions:
  id-token: write
  contents: read

# Prevents concurrent deployments from corrupting Terraform state
concurrency:
  group: terraform-deploy
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Read Role ARN from Config
        id: read_config
        run: |
          ROLE_ARN=$(yq '.aws_role_arn' .github/config.yaml)
          echo "role_arn=$ROLE_ARN" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ steps.read_config.outputs.role_arn }} # Fixed step ID reference
          aws-region: us-east-1 # Fixed indentation

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      # Optional: Only apply on main branch push to prevent feature branches from deploying prematurely
      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan